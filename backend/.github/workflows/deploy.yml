name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Update Cloud Run Jobs with new image
        run: |
          IMAGE=$(gcloud run services describe stock-screener \
            --region=europe-west1 \
            --format='value(spec.template.spec.containers[0].image)')
          echo "Updating jobs with image: $IMAGE"

          gcloud run jobs update screener-sp500 \
            --region=europe-west1 \
            --image="$IMAGE" \
            || echo "screener-sp500 job not found, skipping"

          gcloud run jobs update screener-global \
            --region=europe-west1 \
            --image="$IMAGE" \
            || echo "screener-global job not found, skipping"

          echo "All jobs updated successfully"
