name: Run Cloud Run Job

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - screener-sp500
          - screener-global
          - backtest-sp500
          - backtest-europe

jobs:
  execute:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Execute Job
        run: |
          echo "Executing ${{ inputs.job }}..."
          gcloud run jobs execute ${{ inputs.job }} --region=europe-west1
          echo "Job triggered successfully. Check logs in GCP Console."

      - name: Check Status (wait 30s)
        run: |
          sleep 30
          gcloud run jobs executions list \
            --job=${{ inputs.job }} \
            --region=europe-west1 \
            --limit=1
