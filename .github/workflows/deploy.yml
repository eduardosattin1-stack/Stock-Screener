name: Deploy to Cloud Run
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'What to do'
        required: true
        default: 'deploy-only'
        type: choice
        options:
          - deploy-only
          - run-sp500
          - run-nasdaq
          - run-global
          - run-boring
          - run-composite
          - run-paper-email
          - run-backtest-sp500
          - run-backtest-v8
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      # ═══ ALWAYS: DEPLOY SERVICE + UPDATE JOBS ═══
      - name: Deploy Cloud Run Service
        if: github.event_name == 'push' || inputs.action == 'deploy-only'
        run: |
          cd backend
          gcloud run deploy stock-screener \
            --source=. \
            --region=europe-west1 \
            --memory=1Gi \
            --timeout=3600 \
            --clear-base-image \
            --update-env-vars=SCREEN_INDEX=nasdaq100
      - name: Update Screener Jobs
        if: github.event_name == 'push' || inputs.action == 'deploy-only'
        run: |
          IMAGE=$(gcloud run services describe stock-screener \
            --region=europe-west1 \
            --format='value(spec.template.spec.containers[0].image)')
          echo "Image: $IMAGE"
          gcloud run jobs update screener-sp500 --region=europe-west1 --image="$IMAGE" \
            || echo "screener-sp500 not found, skipping"
          gcloud run jobs update screener-global --region=europe-west1 --image="$IMAGE" \
            || echo "screener-global not found, skipping"

          # Deploy/Update the NASDAQ Job using the shared container image
          gcloud run jobs deploy screener-nasdaq \
            --image="$IMAGE" \
            --region=europe-west1 \
            --memory=2Gi \
            --task-timeout=3600s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }},SCREEN_INDEX=nasdaq" \
            --command="python3" \
            --args="run_scan_job.py"
      # ═══ ALWAYS: DEPLOY PAPER-TRACKING JOBS (BORING + COMPOSITE + EMAIL) ═══
      - name: Deploy Paper-Tracking Jobs
        if: github.event_name == 'push' || inputs.action == 'deploy-only'
        run: |
          IMAGE=$(gcloud run services describe stock-screener \
            --region=europe-west1 \
            --format='value(spec.template.spec.containers[0].image)')
          # BORING strategy runner (top-10 SP500 Pio≥7 by ps_ratio, 26w hold)
          gcloud run jobs deploy boring-runner \
            --image="$IMAGE" \
            --region=europe-west1 \
            --memory=1Gi \
            --task-timeout=900s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --command="python3" \
            --args="paper_strategy_runner.py"
          # COMPOSITE strategy runner (top-10 SP500 by composite, weekly rotation)
          gcloud run jobs deploy composite-runner \
            --image="$IMAGE" \
            --region=europe-west1 \
            --memory=1Gi \
            --task-timeout=600s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --command="python3" \
            --args="paper_strategy_runner_composite.py"
          # Combined weekly email (BORING + COMPOSITE)
          # NOTE: SMTP_USER/SMTP_PASS/EMAIL_TO must exist as GitHub secrets,
          # otherwise the email job will fall through to print-only mode.
          gcloud run jobs deploy paper-email \
            --image="$IMAGE" \
            --region=europe-west1 \
            --memory=512Mi \
            --task-timeout=300s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }},SMTP_USER=${{ secrets.SMTP_USER }},SMTP_PASS=${{ secrets.SMTP_PASS }},EMAIL_TO=${{ secrets.EMAIL_TO }}" \
            --command="python3" \
            --args="paper_weekly_email.py"
      - name: Deploy Backtest Jobs
        if: github.event_name == 'push' || inputs.action == 'deploy-only'
        run: |
          cd backend
          gcloud run jobs deploy backtest-sp500 \
            --source=. \
            --region=europe-west1 \
            --memory=2Gi \
            --task-timeout=86400s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --command="python3" \
            --args="backtest_full.py,--region,sp500,--from,2022-01-01,--to,2025-12-31"
          gcloud run jobs deploy backtest-v8 \
            --source=. \
            --region=europe-west1 \
            --memory=2Gi \
            --task-timeout=86400s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --command="python3" \
            --args="backtest_v8.py"
      # ═══ MANUAL: EXECUTE SCREENER SCANS ═══
      - name: Run SP500 Scan
        if: inputs.action == 'run-sp500'
        run: |
          gcloud run jobs execute screener-sp500 --region=europe-west1
          echo "SP500 scan started. Check logs: gcloud run jobs executions list --job=screener-sp500 --region=europe-west1"
      - name: Run NASDAQ Scan
        if: inputs.action == 'run-nasdaq'
        run: |
          gcloud run jobs execute screener-nasdaq --region=europe-west1
          echo "NASDAQ scan started. Check logs: gcloud run jobs executions list --job=screener-nasdaq --region=europe-west1"
      - name: Run Global Scan
        if: inputs.action == 'run-global'
        run: |
          gcloud run jobs execute screener-global --region=europe-west1
          echo "Global scan started. Check logs: gcloud run jobs executions list --job=screener-global --region=europe-west1"
      # ═══ MANUAL: EXECUTE PAPER-TRACKING JOBS ═══
      - name: Run BORING Strategy Runner
        if: inputs.action == 'run-boring'
        run: |
          gcloud run jobs execute boring-runner --region=europe-west1
          echo "BORING runner started. Check logs: gcloud run jobs executions list --job=boring-runner --region=europe-west1"
      - name: Run COMPOSITE Strategy Runner
        if: inputs.action == 'run-composite'
        run: |
          gcloud run jobs execute composite-runner --region=europe-west1
          echo "COMPOSITE runner started. Check logs: gcloud run jobs executions list --job=composite-runner --region=europe-west1"
      - name: Run Paper-Tracking Email
        if: inputs.action == 'run-paper-email'
        run: |
          gcloud run jobs execute paper-email --region=europe-west1
          echo "Paper email started. Check logs: gcloud run jobs executions list --job=paper-email --region=europe-west1"
      # ═══ MANUAL: EXECUTE BACKTESTS ═══
      - name: Run Backtest SP500
        if: inputs.action == 'run-backtest-sp500'
        run: |
          gcloud run jobs execute backtest-sp500 --region=europe-west1
          echo "Backtest SP500 started (~3-6 hours). Monitor: gcloud run jobs executions list --job=backtest-sp500 --region=europe-west1"
      - name: Run Backtest V8
        if: inputs.action == 'run-backtest-v8'
        run: |
          gcloud run jobs execute backtest-v8 --region=europe-west1
          echo "Backtest V8 started. Monitor: gcloud run jobs executions list --job=backtest-v8 --region=europe-west1"
