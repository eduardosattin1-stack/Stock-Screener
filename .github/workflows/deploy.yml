================================================================
PATCHES for .github/workflows/deploy.yml
Adds paper-all-runner (orchestrator that fires all 4 strategies sequentially)
================================================================

CRITICAL: All `- name:` blocks in the jobs steps list MUST be indented
with EXACTLY 6 spaces (not 4, not 5, not 8). Bruno's memory documents
this from the earlier YAML indent error — re-confirm with the existing
runners (boring-runner, composite-runner, etc) before pasting.

================================================================
PATCH 1 — Add deploy block for paper-all-runner
================================================================

Location: Inside the "Deploy Paper-Tracking Jobs" step, AFTER the
fa-runner block. Same indentation as other gcloud blocks in that step.

INSERT this block after the `fa-runner` deploy block:

          # Orchestrator — runs all 4 paper-tracking strategies sequentially
          # in one Cloud Run Job execution. Used by Cloud Scheduler so all
          # runners fire at the same wall-clock minute (eliminates SPY
          # snapshot drift between strategies).
          gcloud run jobs deploy paper-all-runner \
            --image="$IMAGE" \
            --region=europe-west1 \
            --memory=1Gi \
            --task-timeout=1800s \
            --set-env-vars="FMP_API_KEY=${{ secrets.FMP_API_KEY }}" \
            --command="python3" \
            --args="paper_runners_all.py"


================================================================
PATCH 2 — Add 'run-all' to workflow_dispatch options
================================================================

Find the `inputs.action.options` list in `on.workflow_dispatch:`.
It currently has options like deploy-only, run-sp500, run-boring,
run-composite, run-momentum, run-fa, run-monitor, etc.

INSERT this option (anywhere in the list, but typically grouped with
the other run-* options):

          - run-all


================================================================
PATCH 3 — Add manual execute step
================================================================

Location: Inside the jobs steps list, alongside the other "Run X"
steps (e.g. "Run BORING Paper Strategy", "Run COMPOSITE Paper Strategy",
"Run MOMENTUM Paper Strategy", "Run FA Paper Strategy").

INSERT this step (6-space indent on `- name:`, matching existing siblings):

      - name: Run All Paper Runners (Orchestrator)
        if: inputs.action == 'run-all'
        run: |
          gcloud run jobs execute paper-all-runner --region=europe-west1 --wait
          echo "All-runner finished. Check logs: gcloud run jobs executions list --job=paper-all-runner --region=europe-west1"


================================================================
SANITY CHECK BEFORE COMMITTING
================================================================

After applying all 3 patches, the file should:

1. Have 6 deploy blocks for runners total in "Deploy Paper-Tracking Jobs":
   boring-runner, composite-runner, momentum-runner, fa-runner,
   paper-all-runner (NEW), monitor-prices

2. Have the `run-all` option visible in the GitHub Actions
   "Run workflow" dropdown after push

3. Have a "Run All Paper Runners (Orchestrator)" step that fires only
   when inputs.action == 'run-all'

================================================================
WHY --wait IN THE EXECUTE STEP
================================================================

Other runners use fire-and-forget (no --wait). For paper-all-runner
I included --wait so the GitHub Actions step blocks until the
orchestrator finishes. That way:
  - The Actions log shows pass/fail directly
  - You don't have to dig into Cloud Run logs to confirm all 4 ran
  - Total step duration ≈ 10-30 minutes (acceptable for manual triggers)

If you prefer fire-and-forget like the others, drop `--wait` from
the gcloud command.

================================================================
NEXT STEP — Cloud Scheduler (NOT in this patch)
================================================================

After this YAML lands, manually create a Cloud Scheduler entry:

  Name:        paper-all-friday
  Frequency:   30 22 * * 5      (Friday 22:30 CET, after US close)
  Timezone:    Europe/Amsterdam
  Target:      HTTP POST to:
    https://europe-west1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/project-7aa6df2a-d56b-47d2-8aa/jobs/paper-all-runner:run
  Auth:        OIDC token, same SA as other paper schedulers

Once that's in place, all 4 strategies fire together every Friday and
the SPY-snapshot-drift problem from earlier disappears.

The individual run-boring / run-composite / run-momentum / run-fa
manual triggers stay (useful for one-off debugging) but Cloud Scheduler
should ONLY hit paper-all-runner going forward — disable any other
paper-* schedulers to prevent double-firing.
